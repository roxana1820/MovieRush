<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRush - Movie Catalog</title>
    <link rel="stylesheet" href="movies.css">
    <link rel="stylesheet" href="css/common.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="movies.js" defer></script>
    <script src="js/common.js"></script>
    <script src="include-partials.js"></script>
</head>
<body>

      <video autoplay muted loop playsinline class="background-video" id="bg-video">
         <source src="cinema.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <div id="header"></div>
    
    <div class="main-content">
        <div class="featured-movie">
            <img src="" alt="Featured Movie" id="featuredImage" class="featured-image">
            <div class="movie-info">
                <h2 id="featuredTitle"></h2>
                <p id="featuredDescription"></p>
                <button id="playBtn">Watch Trailer</button>
            </div>
            <div class="nav-buttons">
                <button id="prevBtn">&lt;</button>
                <button id="nextBtn">&gt;</button>
            </div>
        </div>
        <div class="up-next">
            <h3>Up Next</h3>
            <div class="up-next-list" id="upNextList"></div>
        </div>
    </div>

    <div class="movie-section" id="topRatedSection">
        <h3>Top Rated</h3>
        <div class="movie-list-container" data-section="topRatedList">
            <div class="movie-list" id="topRatedList"></div>
        </div>
    </div>

    <div class="movie-section" id="upcomingSection">
        <h3>Upcoming</h3>
        <div class="movie-list-container" data-section="upcomingList">
            <div class="movie-list" id="upcomingList"></div>
        </div>
    </div>

    <div class="movie-section" id="mostWatchedSection">
        <h3>Most Watched</h3>
        <div class="movie-list-container" data-section="mostWatchedList">
            <div class="movie-list" id="mostWatchedList"></div>
        </div>
    </div>
</body>
</html>
