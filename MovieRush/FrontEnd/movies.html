<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRush - Movie Catalog</title>
    <link rel="stylesheet" href="movies.css">
    <script src="movies.js" defer></script>
</head>
<body>
    <div class="header">
        <h1 class="site-title">🎬 MovieRush</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search movies...">
        </div>
    </div>

    <div class="main-content">
        <div class="featured-movie">
            <img src="" alt="Featured Movie" id="featuredImage" class="featured-image">
            <div class="movie-info">
                <h2 id="featuredTitle"></h2>
                <p id="featuredDescription"></p>
                <button id="playBtn">Watch Trailer</button>
            </div>
            <div class="nav-buttons">
                <button id="prevBtn">&lt;</button>
                <button id="nextBtn">&gt;</button>
            </div>
        </div>
        <div class="up-next">
            <h3>Up Next</h3>
            <div class="up-next-list" id="upNextList"></div>
        </div>
    </div>

    <div class="movie-section" id="topRatedSection">
        <h3>Top Rated</h3>
        <div class="movie-list-container" data-section="topRatedList">
            <div class="movie-list" id="topRatedList"></div>
            <div id="sentinel" style="height: 10px;"></div>
        </div>
    </div>

    <div class="movie-section" id="upcomingSection">
        <h3>Upcoming</h3>
        <div class="movie-list-container" data-section="upcomingList">
            <div class="movie-list" id="upcomingList"></div>
        </div>
    </div>

    <div class="movie-section" id="mostWatchedSection">
        <h3>Most Watched</h3>
        <div class="movie-list-container" data-section="mostWatchedList">
            <div class="movie-list" id="mostWatchedList"></div>
        </div>
    </div>
</body>
</html>
