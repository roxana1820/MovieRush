<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details</title>
  <link rel="stylesheet" href="movieDetails.css">
  <link rel="stylesheet" href="css/common.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Inter&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="movieDetails.js" defer></script>
  <script src="js/common.js"></script>
  <script src="include-partials.js"></script>
</head>
<body>
  <video autoplay muted loop playsinline class ="background-video" id="bg-video">
    <source src="cinema.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div id="header"></div>


  <div class="main-content">
  <div class="movie-details-container" id="movieDetails">
    <img id="moviePoster" src="" alt="">
    <div class="movie-details-content">
      <button id="favoriteBtn" class ="favorite-btn">♡</button>
      <h2 id="movieTitle"></h2>
      <p id="movieRating"></p>
      <p id="movieActors"></p>
      <p id="movieOverview"></p>
      <button class="watch-trailer-btn" id="watchTrailerBtn">▶ Watch Trailer</button>
    </div>
  </div>
  </div>

</body>
</html>
