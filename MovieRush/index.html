<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieRush</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Inter&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-overlay"></div>

  <video autoplay muted loop class="background-video">
    <source src="trailers.mp4" type="video/mp4">
    Вашият браузър не поддържа видео.
  </video>
  

  <h1 class="site-title">🎬 Welcome to MovieRush</h1>

  <p class="intro-text">Enter the world of cinema. Find, rate and share your favorite movies!</p>

  <div class="container">
    <div class="form-container glass">
      <form id="registerForm" class="form">
        <h3>Register</h3>
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Password" required />
        <input type="password" id="confirmPassword" placeholder="Confirm password" required />
        <button type="submit">Register</button>
        <div id="registerMessage"></div>
      </form>

      <form id="loginForm" class="form">
        <h3>Login</h3>
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
        <div id="loginMessage"></div>
      </form>
    </div>
  </div>

  <div id="message"></div>
  <script src="script.js"></script>
</body>
</html>
